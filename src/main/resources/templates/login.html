<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
          height:100vh;
          display:flex;
          align-items:center;
          justify-content:center;
          background:linear-gradient(135deg,#0d6efd,#6610f2);
        }

        .login-card{
          width:100%;
          max-width:400px;
          border:none;
          border-radius:16px;
          box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-title{
          font-weight:600;
        }

        .btn-login{
          border-radius:10px;
          font-weight:500;
        }

        .form-control{
          border-radius:10px;
        }
    </style>
</head>
<body>

<div class="card login-card p-4">
    <div class="card-body">

        <h3 class="text-center mb-4 login-title">Acessar Sistema</h3>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário">
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Lembrar-me</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-login">Entrar</button>

        </form>

    </div>
</div>

</body>
</html>
